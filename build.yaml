targets:
  $default:
    # example/ is a separate package with its own pubspec; exclude it so root
    # build_runner does not need chopper and other example-only deps.
    sources:
      - lib/**
      - test/**
      - $package$
  swagger_dart_code_generator:swagger_dart_code_generator:
    sources:
      - lib/**
      - test/**
      - $package$
    builders:
      swagger_dart_code_generator:
        enabled: True
builders:
  swagger_dart_code_generator:
    import: "package:swagger_dart_code_generator/swagger_dart_code_generator.dart"
    builder_factories: ["swaggerCodeBuilder"]
    build_extensions:
      "$lib$": [".swagger.dart", ".models.dart", ".converter.dart", ".metadata.swagger.dart"]
    build_to: source
    auto_apply: dependents
    runs_before: ["chopper_generator", "json_serializable"]
